<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resumen de Préstamo</title>

<style>
/* Reset básico */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #161B32;
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px; /* Para que haya espacio al hacer scroll */
}

/* ------------------- Pantalla inicial ------------------- */
#loadingScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #161B32;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    font-weight: bold;
    z-index: 10;
    animation: fadeOut 6s forwards;
}

/* Animación fadeOut */
@keyframes fadeOut {
    0% {opacity: 1;}
    90% {opacity: 1;}
    100% {opacity: 0; visibility: hidden;}
}

/* ------------------- Animación de tarjeta ------------------- */
@keyframes slideDownFadeIn {
    0% {opacity: 0; transform: translateY(-50px);}
    100% {opacity: 1; transform: translateY(0);}
}

/* ------------------- Tarjeta principal ------------------- */
.credito {
    max-width: 420px;
    width: 100%;
    background-color: #1c2145;
    border-radius: 20px;
    padding: 40px 35px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    display: none; /* se muestra luego del loading */
    flex-direction: column;
    align-items: center;
    animation: slideDownFadeIn 1s ease forwards;
    margin: 40px auto; /* permite scroll si pantalla pequeña */
}

/* ------------------- Encabezado ------------------- */
.header {
    text-align: center;
    margin-bottom: 25px;
}

.header h2 {
    font-size: 17px;
    font-weight: 500;
    color: #fa496e;
    letter-spacing: 1px;
}

/* ------------------- Fecha ------------------- */
.fecha {
    font-size: 13px;
    opacity: 0.7;
    align-self: flex-end;
    margin-bottom: 20px;
}

/* ------------------- Tabla ------------------- */
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
}

td {
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 15px;
}

td:last-child {
    text-align: right;
    font-weight: 600;
}

.estado {
    color: #4CAF50;
    font-weight: bold;
}

/* ------------------- Total ------------------- */
.total {
    width: 100%;
    padding: 20px;
    background: rgba(250,73,110,0.25);
    border-radius: 12px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 8px 25px rgba(250,73,110,0.2);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    margin-bottom: 25px;
}

.total:hover {
    transform: scale(1.02);
    box-shadow: 0 10px 30px rgba(250,73,110,0.3);
}

/* ------------------- Botón ------------------- */
.boton {
    width: 100%;
    padding: 16px;
    background: #fa496e;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.boton:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #fa496e;
}

/* ------------------- Footer ------------------- */
.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.6;
    text-align: center;
}

/* Responsive */
@media screen and (max-width: 450px) {
    .credito {
        width: 90%;
        padding: 25px 20px;
    }
    .total {
        font-size: 18px;
    }
    .boton {
        font-size: 15px;
    }
}
</style>
</head>
<body>

<!-- Pantalla de carga inicial -->
<div id="loadingScreen">
    Evaluando tus pagos...
</div>

<!-- Tarjeta de préstamo -->
<div class="credito" id="creditoCard">

    <div class="header">
        <h2>Así quedó tu préstamo</h2>
    </div>

    <div class="fecha">
        Fecha: <span id="fechaActual"></span>
    </div>

    <table>
        <tr>
            <td>Monto aprobado</td>
            <td>$850.000</td>
        </tr>
        <tr>
            <td>Plazo</td>
            <td>12 meses</td>
        </tr>
        <tr>
            <td>Cuota mensual</td>
            <td>$76.916</td>
        </tr>
        <tr>
            <td>Tasa de interés</td>
            <td>2.5% mensual</td>
        </tr>
        <tr>
            <td>Estado del crédito</td>
            <td class="estado">Aprobado ✔</td>
        </tr>
    </table>

    <div class="total">
        Total a pagar: $922.992
    </div>

    <button class="boton"><a href="cuatro.html" style="color: white; text-decoration: none;">Aceptar Prestamo</a></button>

    <div class="footer">
        Este documento es un resumen informativo del crédito aprobado.
    </div>

</div>

<script>
    // Mostrar fecha
    const fecha = new Date();
    document.getElementById("fechaActual").innerText = fecha.toLocaleDateString();

    // Ocultar pantalla de carga y mostrar tarjeta después de 6s
    setTimeout(() => {
        document.getElementById("loadingScreen").style.display = 'none';
        const card = document.getElementById("creditoCard");
        card.style.display = 'flex';
        // scroll automático a la tarjeta si la pantalla es pequeña
        card.scrollIntoView({behavior: "smooth", block: "center"});
    }, 6000);
</script>

</body>
</html>
