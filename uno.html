    <style>
        .did {
            animation-name: log;
            animation-duration: 1s;
            animation-iteration-count: infinite;
        }
        
        @keyframes log {
            0% {
                transform: translateY(0%);
            }
            50% {
                transform: translateX(1px);
            }
        }
        
        .di {
            animation-name: log;
            animation-duration: 2s;
            animation-iteration-count: infinite;
        }
        
        @keyframes log {
            0% {
                transform: translateX(0%);
            }
            50% {
                transform: translateY(5%);
            }
        }
    </style>

<style>


/* Cambiamos el nombre de la clase principal */
.caja-rosada {
    background: #161B32;
    box-shadow: 0 0 25px #161B32;
    padding: 40px;
}

.titulo-neon {
    text-align: center;
    color: hsl(0, 0%, 100%);
    text-shadow: 0 0 10px hsl(0, 0%, 100%), 0 0 20px hsl(0, 0%, 100%);
    margin-bottom: 25px;
}

.texto-label {
    color: hsl(300, 17%, 98%);
    font-size: 14px;
}

.campo-datos {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px 0;
    border: none;
    border-radius: 8px;
    outline: none;
    background: hsla(0, 0%, 100%, 0.945);
    color: rgb(0, 0, 0);
    box-shadow: 0 0 8px #fa496e;
}

.campo-datos:focus {
    box-shadow: 0 0 15px #fa496e;
}

.boton-enviar {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #fa496e;
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 15px #fa496e;
    transition: 0.3s;
}

.boton-enviar:hover {
    background: #fa496e;
    box-shadow: 0 0 25px #fa496e;
}
</style>

</head>
<body>

<div class="caja-rosada">

     <h1 style="font-size: 30px;" class="logo" alt="logo"><h1 style="color: white; font-weight: 900; font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;">Platu<i style="color: #fa496e; font-weight: 900; font-family: sans-serif;">!</i></h1>
                    

<i style="color: rgb(252, 111, 139);">Ingrese los datos para solicitar su prestamo</i>


    <form>

        <label class="texto-label">Ingrese Nombre</label>
        <input type="text" class="campo-datos" required>

        <label class="texto-label">Cédula/PPT</label>
        <input type="number" class="campo-datos" required>

        <label class="texto-label">Teléfono</label>
        <input type="tel" class="campo-datos" required>

        <label class="texto-label">Ciudad</label>
        <input type="text" class="campo-datos" required>

        <label class="texto-label">Fecha de Expedición de Cédula</label>
        <input type="date" class="campo-datos" required>

        <button type="submit" class="boton-enviar"><a href="dos.html" style="text-decoration: none; color: white;">SOLICITAR</a></button>



</body>
